<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Adventure - Play</title>
    <link rel="icon" type="image/png" href="WA-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; transition: background 0.3s, color 0.3s; }
        .eng-text { font-family: 'Fredoka One', cursive; direction: ltr; }
        .perspective-1000 { perspective: 1000px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card-flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 2.5rem; }
        .card-back { transform: rotateY(180deg); }
        .night-mode { background-color: #0f172a !important; color: #f8fafc !important; }
        .night-mode .bg-white { background-color: #1e293b !important; color: #f8fafc !important; }
        .night-mode .bg-blue-50 { background-color: #0f172a !important; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-blue-50 flex flex-col items-center min-h-screen p-4">
    <div id="app" class="w-full max-w-2xl flex flex-col items-center mt-6">
        <div id="loading-msg" class="animate-pulse text-blue-500 font-bold mt-20">טוען הרפתקה...</div>
    </div>
    <button id="toggleNight" class="fixed bottom-4 left-4 p-4 rounded-full bg-white shadow-2xl text-2xl hover:scale-110 transition-transform z-50">☀️</button>

    <script>
        // כל הקוד נמצא כאן בפנים כדי למנוע בעיות טעינה של קבצים נפרדים
        let words = [];
        let currentIndex = 0;

        function loadFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('w');
            
            if (!data) {
                document.getElementById('app').innerHTML = `
                    <div class="text-center p-10 bg-white rounded-[2.5rem] shadow-2xl animate-fade-in border-t-8 border-blue-500 mt-20">
                        <h2 class="text-3xl font-black text-blue-600 mb-4 text-center">Word Adventure 🚀</h2>
                        <p class="text-slate-600 font-bold mb-4">ברוכים הבאים! אנא היכנסו דרך קישור מהפורטל.</p>
                    </div>`;
                return;
            }

            try {
                const decodedData = decodeURIComponent(atob(data).split('').map(c => 
                    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                
                const lines = decodedData.split('\n');
                const title = lines[0] || "יחידת לימוד";
                
                words = lines.slice(1).filter(line => line.includes('-')).map(line => {
                    const [eng, heb] = line.split('-').map(s => s.trim());
                    return { eng, heb };
                });

                if (words.length > 0) renderApp(title);
                else throw new Error("No words");
            } catch (e) {
                document.getElementById('app').innerHTML = `<div class="mt-20 font-bold text-red-500">שגיאה בטעינת המילים. וודאו שהקישור תקין.</div>`;
            }
        }

        function renderApp(title) {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="text-center mb-8 animate-fade-in w-full">
                    <h1 class="text-4xl font-black text-blue-600 mb-6">${title}</h1>
                    <div class="flex gap-3 justify-center">
                        <button onclick="switchMode('cards')" id="btn-cards" class="px-6 py-2 bg-blue-600 text-white rounded-2xl font-bold shadow-lg">כרטיסיות 🗂️</button>
                        <button onclick="switchMode('quiz')" id="btn-quiz" class="px-6 py-2 bg-white border-2 border-green-500 text-green-600 rounded-2xl font-bold">מבחן 📝</button>
                    </div>
                </div>
                <div id="game-container" class="w-full flex flex-col items-center"></div>`;
            switchMode('cards');
        }

        function switchMode(mode) {
            currentIndex = 0;
            const container = document.getElementById('game-container');
            if (mode === 'cards') renderCards();
            else startQuiz();
        }

        function renderCards() {
            const container = document.getElementById('game-container');
            const word = words[currentIndex];
            container.innerHTML = `
                <div class="perspective-1000 w-80 h-96 cursor-pointer animate-fade-in" onclick="this.classList.toggle('card-flipped')">
                    <div class="card-inner w-full h-full shadow-2xl">
                        <div class="card-front bg-white text-5xl font-black text-blue-600 eng-text border-4 border-blue-100">${word.eng}</div>
                        <div class="card-back bg-blue-600 text-5xl font-bold text-white border-4 border-white text-center p-4">${word.heb}</div>
                    </div>
                </div>
                <div class="flex gap-10 mt-10 items-center">
                    <button onclick="changeCard(-1)" class="text-5xl">➡️</button>
                    <div class="bg-white px-6 py-2 rounded-full shadow-md font-black text-gray-500">${currentIndex + 1} / ${words.length}</div>
                    <button onclick="changeCard(1)" class="text-5xl">⬅️</button>
                </div>`;
        }

        function changeCard(step) {
            currentIndex = (currentIndex + step + words.length) % words.length;
            renderCards();
        }

        function startQuiz() {
            if (currentIndex >= words.length) {
                document.getElementById('game-container').innerHTML = `
                    <div class="text-center p-10 bg-white rounded-[3rem] shadow-2xl animate-fade-in">
                        <h2 class="text-4xl font-black text-green-600 mb-4">אלופים! ✨</h2>
                        <button onclick="switchMode('cards')" class="px-8 py-3 bg-blue-600 text-white rounded-2xl font-bold">תרגול חוזר</button>
                    </div>`;
                confetti(); return;
            }
            const word = words[currentIndex];
            const options = [word.heb, ...words.filter(w => w.heb !== word.heb).sort(() => 0.5 - Math.random()).slice(0, 3).map(w => w.heb)].sort(() => 0.5 - Math.random());
            document.getElementById('game-container').innerHTML = `
                <div class="w-full max-w-md bg-white p-8 rounded-[2.5rem] shadow-2xl border-b-8 border-green-500 animate-fade-in">
                    <h2 class="text-5xl font-black text-center mb-8 eng-text">${word.eng}</h2>
                    <div class="grid gap-3">
                        ${options.map(opt => `<button onclick="checkAnswer('${opt}', '${word.heb}')" class="p-5 text-2xl font-bold border-2 border-slate-100 rounded-2xl hover:bg-green-50 transition-all">${opt}</button>`).join('')}
                    </div>
                </div>`;
        }

        function checkAnswer(sel, cor) {
            if (sel === cor) { currentIndex++; startQuiz(); }
            else { alert("נסו שוב! 💪"); }
        }

        document.getElementById('toggleNight').addEventListener('click', () => {
            document.body.classList.toggle('night-mode');
            document.getElementById('toggleNight').innerText = document.body.classList.contains('night-mode') ? '🌙' : '☀️';
        });

        loadFromUrl();
    </script>
</body>
</html>
